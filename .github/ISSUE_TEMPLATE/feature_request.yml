name: Feature Request
description: Suggest a new feature or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill in every field. A screenshot or mockup is required — even a photo of a hand-drawn sketch works.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true

  - type: upload
    id: screenshot
    attributes:
      label: Screenshot or mockup
      description: Attach a screenshot, mockup, or photo of a hand-drawn sketch showing what you have in mind. Drag-and-drop or click to browse.
    validations:
      required: true
      accept: ".png,.jpg,.jpeg,.gif,.webp"

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How you think this could be implemented, if you have ideas.
    validations:
      required: false
