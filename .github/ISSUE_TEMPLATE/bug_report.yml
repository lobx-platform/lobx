name: Bug Report
description: Report a bug or unexpected behavior.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill in every field. A screenshot is required.

  - type: input
    id: title
    attributes:
      label: Bug title
      placeholder: Brief summary of the issue
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened
    validations:
      required: true

  - type: upload
    id: screenshot
    attributes:
      label: Screenshot
      description: Attach a screenshot showing the bug. Drag-and-drop or click to browse.
    validations:
      required: true
      accept: ".png,.jpg,.jpeg,.gif,.webp"

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Python version, or any other relevant details.
      placeholder: |
        OS: macOS 15
        Browser: Chrome 130
        Python: 3.12
    validations:
      required: false
