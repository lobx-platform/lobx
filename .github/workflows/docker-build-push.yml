name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Backend image
      uses: docker/build-push-action@v5
      with:
        context: ./back
        file: ./docker/Dockerfile.back
        push: true
        tags: |
          venvoo/trading_platform:back
          venvoo/trading_platform:back-${{ github.sha }}

  deploy-backend:
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to Durham server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
        script: |
          set -e
          cd /root/trading_platform
          touch .env

          upsert_env_var() {
            name="$1"
            value="$2"
            if [ -z "$value" ]; then
              echo "Skipping $name because value is empty"
              return
            fi
            grep -q "^${name}=" .env 2>/dev/null \
              && sed -i "s|^${name}=.*|${name}=${value}|" .env \
              || echo "${name}=${value}" >> .env
          }

          upsert_env_var TURNSTILE_SECRET_KEY '${{ secrets.TURNSTILE_SECRET_KEY }}'
          upsert_env_var ADMIN_PASSWORD '${{ secrets.ADMIN_PASSWORD }}'
          upsert_env_var NGROK_AUTHTOKEN '${{ secrets.NGROK_AUTHTOKEN }}'

          if ! grep -q '^NGROK_AUTHTOKEN=' .env 2>/dev/null && [ -n '${{ secrets.NGROK_YML }}' ]; then
            cat > /tmp/lobx-ngrok.yml <<'EOF'
          ${{ secrets.NGROK_YML }}
          EOF
            legacy_ngrok_token="$(awk -F': *' '/^authtoken:/ {print $2; exit}' /tmp/lobx-ngrok.yml)"
            rm -f /tmp/lobx-ngrok.yml
            upsert_env_var NGROK_AUTHTOKEN "$legacy_ngrok_token"
          fi

          git fetch origin main
          git reset --hard origin/main
          echo '${{ secrets.DOCKERHUB_TOKEN }}' | docker login docker.io \
            --username '${{ secrets.DOCKERHUB_USERNAME }}' \
            --password-stdin
          chmod +x ./deploy.sh
          ./deploy.sh

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'
        cache-dependency-path: front/yarn.lock

    - name: Install dependencies
      run: cd front && yarn install --frozen-lockfile

    - name: Build frontend
      run: cd front && yarn build
      env:
        VITE_HTTP_URL: https://dthinkr.ngrok.app/
        VITE_WS_URL: wss://dthinkr.ngrok.app/
        VITE_TURNSTILE_SITE_KEY: 0x4AAAAAACfHKEP_ndWYpu3-

    - name: Deploy to Firebase
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: ${{ secrets.GITHUB_TOKEN }}
        firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        projectId: london-trader
        channelId: live
        entryPoint: ./front
