name: Auto-close verified issues

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday 9am UTC
  workflow_dispatch:

jobs:
  close-stale-fix-pushed:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/stale@v9
        with:
          only-labels: 'fix-pushed'
          days-before-stale: -1
          days-before-close: 7
          close-issue-message: 'No feedback after 7 days — closing as verified. Reopen if the issue persists.'
          stale-issue-label: ''
          exempt-issue-labels: ''
          days-before-pr-stale: -1
          days-before-pr-close: -1
