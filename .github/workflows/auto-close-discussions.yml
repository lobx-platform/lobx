name: Auto-close stale discussions

on:
  schedule:
    - cron: '0 9 * * *' # Every day 9am UTC
  workflow_dispatch:

jobs:
  close-stale-discussions:
    runs-on: ubuntu-latest
    permissions:
      discussions: write
    steps:
      - name: Close discussions older than 14 days
        uses: actions/github-script@v7
        with:
          script: |
            const cutoff = new Date(Date.now() - 14 * 24 * 60 * 60 * 1000).toISOString();

            const query = `query($owner: String!, $repo: String!) {
              repository(owner: $owner, name: $repo) {
                discussions(first: 50, states: [OPEN]) {
                  nodes { id number title updatedAt }
                }
              }
            }`;

            const result = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const stale = result.repository.discussions.nodes.filter(
              d => d.updatedAt < cutoff
            );

            for (const d of stale) {
              console.log(`Closing #${d.number}: ${d.title} (last updated ${d.updatedAt})`);
              await github.graphql(`mutation($id: ID!) {
                closeDiscussion(input: {discussionId: $id, reason: OUTDATED}) {
                  discussion { number }
                }
              }`, { id: d.id });
            }

            console.log(`Closed ${stale.length} stale discussion(s).`);
