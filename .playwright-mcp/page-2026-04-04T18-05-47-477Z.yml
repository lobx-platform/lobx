              - heading "Data Collection" [level=4] [ref=e74]:
                - img [ref=e75]
                - text: Data Collection
              - paragraph [ref=e79]: During this study, we will collect data from you only related to your buy or sell decision orders. At the end of the study, you will be asked to complete a short survey about your overall experience with our platform. Additionally, the Prolific platform will provide some basic demographic characteristics such as age, gender and education. All data will be anonymized and labelled using only your Unique Prolific ID.
            - generic [ref=e80]:
              - heading "Data Protection" [level=4] [ref=e81]:
                - img [ref=e82]
                - text: Data Protection
              - paragraph [ref=e85]: This research commits to abide by the Data Protection Act (2018).
            - generic [ref=e86]:
              - heading "General Data Protection Regulation Statement" [level=4] [ref=e87]:
                - img [ref=e88]
                - text: General Data Protection Regulation Statement
              - generic [ref=e91]:
                - paragraph [ref=e92]: Important General Data Protection Regulation information (GDPR). Royal Holloway, University of London is the sponsor for this study and is based in the UK. We will be using information from you in order to undertake this study and will act as the data controller for this study. This means that we are responsible for looking after your information and using it properly. Any data you provide during the completion of the study will be stored securely on hosted on servers within the European Economic Area'. Royal Holloway is designated as a public authority and in accordance with the Royal Holloway and Bedford New College Act 1985 and the Statutes which govern the College, we conduct research for the public benefit and in the public interest.
                - paragraph [ref=e93]: Royal Holloway has put in place appropriate technical and organisational security measures to prevent your personal data from being accidentally lost, used or accessed in any unauthorised way or altered or disclosed. Royal Holloway has also put in place procedures to deal with any suspected personal data security breach and will notify you and any applicable regulator of a suspected breach where legally required to do so.
                - paragraph [ref=e94]: To safeguard your rights, we will use the minimum personally-identifiable information possible (i.e., the email address you provide us). The lead researcher will keep your contact details confidential and will use this information only as required (i.e., to provide a summary of the study results if requested and/or for the prize draw).
                - paragraph [ref=e95]:
                  - text: You can find out more about your rights under the GDPR and Data Protection Act 2018 by visiting
                  - link "https://www.royalholloway.ac.uk/about-us/more/governance-and-strategy/data-protection/" [ref=e96] [cursor=pointer]:
                    - /url: https://www.royalholloway.ac.uk/about-us/more/governance-and-strategy/data-protection/
                  - text: and if you wish to exercise your rights, please contact
                  - link "dataprotection@royalholloway.ac.uk" [ref=e97] [cursor=pointer]:
                    - /url: mailto:dataprotection@royalholloway.ac.uk
