              - heading "Introduction" [level=4] [ref=e55]:
                - img [ref=e56]
                - text: Introduction
              - paragraph [ref=e58]: Royal Holloway, University of London supports the practise of protecting human participants in research. This form provides you with important information about taking part in this study. Your participation in this study is entirely voluntary, and you have the right to withdraw at any time during the experimental session without penalty or negative consequences. If you choose to withdraw during the experimental session, any data collected from you will be deleted and not included in the final analysis. However, you will not be able to withdraw your consent after the study is completed, and the payment has been issued.
            - generic [ref=e59]:
              - heading "Summary" [level=4] [ref=e60]:
                - img [ref=e61]
                - text: Summary
              - paragraph [ref=e65]:
                - text: The purpose of this study is to investigate the interaction between human and machines (AI agents) in electronic financial markets. In this study, we will ask you to participate in various experimental financial markets where you will be able to make decisions regarding buying or selling a virtual financial asset (not a real asset). This study will take approximately
                - strong [ref=e66]: 30 minutes
                - text: to complete. Taking part in this study is a great opportunity to learn how electronic financial markets operate, and you will also have the chance to earn financial profits depending on your performance.
            - generic [ref=e67]:
